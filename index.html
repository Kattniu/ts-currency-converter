<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter Pro | Katherine Gonzales</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <section class="converter-card">
            <h1>Conversor de Monedas</h1>
            <p class="subtitle">Módulo 02 - Web Apps</p>

            <div class="input-group">
                <label for="amount">Cantidad a convertir:</label>
                <input type="number" id="amount" placeholder="Ej: 100.00" min="0">
            </div>

            <div class="selection-container">
                <div class="input-group">
                    <label for="fromCurrency">De:</label>
                    <select id="fromCurrency">
                        <option value="USD">USD - Dólar Estadounidense</option>
                        <option value="PEN" selected>PEN - Sol Peruano</option>
                        <option value="EUR">EUR - Euro</option>
                        <option value="MXN">MXN - Peso Mexicano</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="toCurrency">A:</label>
                    <select id="toCurrency">
                        <option value="USD" selected>USD - Dólar Estadounidense</option>
                        <option value="PEN">PEN - Sol Peruano</option>
                        <option value="EUR">EUR - Euro</option>
                        <option value="MXN">MXN - Peso Mexicano</option>
                    </select>
                </div>
            </div>

            <button id="convertBtn">Convertir Ahora</button>

            <div id="resultDisplay" class="result-box">
                <span class="placeholder">El resultado aparecerá aquí</span>
            </div>
        </section>

        <section class="history-section">
            <h2>Historial de Conversiones</h2>
            <ul id="historyList">
                </ul>
        </section>
    </main>

    <script src="script.js" defer></script>
</body>
</html>
