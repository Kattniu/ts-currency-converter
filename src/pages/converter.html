<!DOCTYPE html>
<html lang="en">
<head>
        <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">

    <!-- Color morado en la barra del navegador móvil -->
    <meta name="theme-color" content="#6710a5">

    <!-- Para iPhone -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Converter">
    <link rel="apple-touch-icon" href="/src/logo/apple-touch-icon.png">

    <!-- Favicon para el navegador -->
    <link rel="icon" type="image/png" sizes="32x32" href="/src/logo/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/src/logo/favicon-16x16.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter Pro | Katherine Gonzales</title>
    <link rel="stylesheet" href="/src/styles/style.css">
    
</head>
<body>

    <main class="container">
        <section class="converter-card">
            <h1>Currency Converter</h1>
            <p class="subtitle">Module 02 - Web Apps</p>

            <div class="input-group">
                <label for="amount">Amount to convert:</label>
                <input type="number" id="amount" placeholder="Ex: 100.00" min="0">
            </div>

            <div class="selection-container">
                <div class="input-group">
                    <label for="fromCurrency">From:</label>
                    <select id="fromCurrency">
                        <option value="USD">USD - US Dollar</option>
                        <option value="PEN" selected>PEN - Peruvian Sol</option>
                        <option value="EUR">EUR - Euro</option>
                        <option value="MXN">MXN - Mexican Peso</option>
                        <option value="GBP">GBP - British Pound</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="toCurrency">To:</label>
                    <select id="toCurrency">
                        <option value="USD" selected>USD - US Dollar</option>
                        <option value="PEN">PEN - Peruvian Sol</option>
                        <option value="EUR">EUR - Euro</option>
                        <option value="MXN">MXN - Mexican Peso</option>
                        <option value="GBP">GBP - British Pound</option>
                    </select>
                </div>
            </div>

            <button id="convertBtn">Convert Now</button>
            <a href="/src/pages/rates.html" class="back-btn">View Exchange Rates</a>

            <div id="resultDisplay" class="result-box">
                <span class="placeholder">Result will appear here</span>
            </div>
        </section>

        <section class="history-section">
            <h2>Transaction History</h2>
            <ul id="historyList">
                </ul>
        </section>
      <button id="logoutBtn" class="back-btn">🚪 Logout</button>
    </main>

    <script src="/src/scripts/converter.js" defer></script>
</body>
</html>
