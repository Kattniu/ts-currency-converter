<!DOCTYPE html>
<html lang="en">
<head>
        <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">

    <!-- Color morado en la barra del navegador móvil -->
    <meta name="theme-color" content="#6710a5">

    <!-- Para iPhone -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Converter">
    <link rel="apple-touch-icon" href="/src/logo/apple-touch-icon.png">

    <!-- Favicon para el navegador -->
    <link rel="icon" type="image/png" sizes="32x32" href="/src/logo/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/src/logo/favicon-16x16.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Currency Converter Pro</title>
    <link rel="stylesheet" href="../styles/style.css">
</head>
<body>

    <main class="container">
        <section class="converter-card">
            <!-- Welcome Header -->
            <h1>Currency Converter Pro</h1>
            <p class="subtitle">Katherine Gonzales</p>

            <!-- Welcome message -->
            <div class="welcome-box">
                <p>Welcome! This app allows you to convert between multiple currencies in real time.</p>
            </div>
            <!-- Available currencies info - generated dynamically -->
            <div class="info-box">
                <h3>Available Currencies:</h3>
                <ul id="currencyList"></ul>
            </div>

            <div class="nav-buttons">
                <a href="login.html" class="main-btn">Login</a>
            </div>

        </section>
    </main>
    <script src="../scripts/index.js" defer></script>
</body>
</html>
