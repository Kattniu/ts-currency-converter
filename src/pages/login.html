<!DOCTYPE html>
<html lang="en">
    <head>

    <link rel="icon" type="image/png" sizes="16x16" href="/src/logo/favicon-16x16.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Katherine Gonzales</title>

</head>
<body>

    <main class="container">
        <section class="converter-card">

            <p class="subtitle">Module 03 - Cloud Database</p>

            <div class="input-group">
                <label for="loginEmail">Email:</label>
                <input type="text" id="loginEmail" placeholder="Ex: katherine@email.com">

            <div class="input-group">
                <label for="loginPassword">Password:</label>
                <input type="password" id="loginPassword" placeholder="Your password">

            <div id="loginError" class="message-display"></div>
            <div id="loginSuccess" class="message-display"></div>
            <button id="loginBtn">Login</button>
            <a href="register.html" class="back-btn">Don't have an account? Register</a>
