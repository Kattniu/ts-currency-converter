<!DOCTYPE html>
<html lang="en">
<head>
        <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">

    <!-- Color morado en la barra del navegador móvil -->
    <meta name="theme-color" content="#6710a5">

    <!-- Para iPhone -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Converter">
    <link rel="apple-touch-icon" href="/src/logo/apple-touch-icon.png">

    <!-- Favicon para el navegador -->
    <link rel="icon" type="image/png" sizes="32x32" href="/src/logo/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/src/logo/favicon-16x16.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exchange Rates | Katherine Gonzales</title>
    <link rel="stylesheet" href="/src/styles/style.css">
</head>
<body>

    <main class="container">
        <section class="converter-card">
            <h1>Exchange Rates</h1>
            <p class="subtitle">All rates are based on 1 USD</p>

            <!-- Dynamic table generated by TypeScript -->
            <table id="ratesTable" class="rates-table">
                <thead>
                    <tr>
                        <th>Currency</th>
                        <th>Code</th>
                        <th>Rate (per 1 USD)</th>
                    </tr>
                </thead>
                <tbody id="ratesBody">
                </tbody>
            </table>
             <button id="logoutBtn" class="back-btn">🚪 Logout</button>
            <a href="/src/pages/converter.html" class="back-btn">← Back to Converter</a>
        </section>
        </main>
    <script src="/src/scripts/rates.js" defer></script>
</body>
</html>
