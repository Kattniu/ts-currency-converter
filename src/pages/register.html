<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Currency Converter Pro</title>
    <link rel="stylesheet" href="../styles/style.css">
</head>
<body>

    <main class="container">
        <section class="converter-card">
            <h1>Create Account</h1>
            <p class="subtitle">Module 03 - Cloud Database</p>

            <div class="input-group">
                <label for="fullName">Full Name:</label>
                <input type="text" id="fullName" placeholder="Ex: Katherine Gonzales">
            </div>

            <div class="input-group">
                <label for="email">Email:</label>
                <input type="text" id="email" placeholder="Ex: katherine@email.com">
            </div>

            <div class="input-group">
                <label for="password">Password:</label>
                <div class="password-container">
                    <input type="password" id="password" placeholder="Minimum 6 characters">
                    <button type="button" id="togglePassword" class="pass-btn">👁️</button>
                </div>
            </div>
            <!-- Error messages — solo aparece si hay error -->
            <div id="errorDisplay" class="message-display"></div>

            <button id="registerBtn">Create Account</button>

            <!-- Success message — solo aparece si hay éxito -->
            <div id="successDisplay" class="message-display"></div>

            <a href="index.html" class="back-btn">← Back to Home</a>
        </section>

        <section class="history-section">
            <h2>Registered Users</h2>
            <ul id="usersList"></ul>
        </section>

    </main>

    <script src="../scripts/register.js" defer></script>
</body>
</html>
