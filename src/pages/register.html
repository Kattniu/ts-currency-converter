<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Katherine Gonzales</title>
    <link rel="stylesheet" href="../styles/style.css">
</head>
<body>

    <main class="container">
        <section class="converter-card">
            <h1>Create Account</h1>
            <p class="subtitle">Module 02 - Web Apps</p>

            <!-- Registration Form -->
            <div class="input-group">
                <label for="fullName">Full Name:</label>
                <input type="text" id="fullName" placeholder="Ex: Katherine Gonzales">
            </div>

            <div class="input-group">
                <label for="email">Email:</label>
                <input type="text" id="email" placeholder="Ex: katherine@email.com">
            </div>

            <div class="input-group">
                <label for="password">Password:</label>
                <input type="password" id="password" placeholder="Minimum 6 characters">
            </div>

            <!-- Error messages will appear here -->
            <div id="errorDisplay" class="result-box"></div>

            <button id="registerBtn">Register</button>

            <!-- Success message -->
            <div id="successDisplay" class="result-box"></div>

            <a href="index.html" class="back-btn">← Back to Converter</a>
        </section>
        <section class="history-section">
            <h2>Registered Users</h2>
            <ul id="usersList"></ul>
        </section>
        <a href="login.html" class="main-btn">Login</a>
    </main>
    <script src="../scripts/register.js" defer></script>
</body>
</html>
